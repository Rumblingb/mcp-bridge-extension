<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MCP Bridge</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 380px;
      min-height: 500px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a1a;
      color: #e0e0f0;
      overflow-x: hidden;
    }
    .header {
      background: linear-gradient(135deg, #6c3ce0, #3b82f6);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .header h1 { font-size: 18px; font-weight: 700; color: #fff; }
    .header .logo { font-size: 24px; }
    
    .auth-bar {
      padding: 10px 20px;
      background: #12122a;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
    }
    .auth-bar .user { color: #8b8bcc; }
    .auth-bar button {
      background: #6c3ce0;
      color: white;
      border: none;
      padding: 6px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
    }
    .auth-bar button:hover { background: #7c4cf0; }
    
    .tier-badge {
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 10px;
      font-weight: 600;
    }
    .tier-free { background: #1e3a5f; color: #60a5fa; }
    .tier-pro { background: #4a1d6e; color: #c084fc; }
    .tier-unlimited { background: #5c3a1e; color: #fbbf24; }
    
    .search-bar {
      padding: 10px 20px;
      background: #12122a;
    }
    .search-bar input {
      width: 100%;
      padding: 8px 12px;
      border-radius: 8px;
      border: 1px solid #2a2a4a;
      background: #0a0a1a;
      color: #e0e0f0;
      font-size: 13px;
      outline: none;
    }
    .search-bar input:focus { border-color: #6c3ce0; }
    
    .filters {
      padding: 0 20px 10px;
      background: #12122a;
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .filter-chip {
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 11px;
      cursor: pointer;
      border: 1px solid #2a2a4a;
      background: transparent;
      color: #8b8bcc;
      transition: all 0.2s;
    }
    .filter-chip.active, .filter-chip:hover {
      background: #6c3ce0;
      border-color: #6c3ce0;
      color: #fff;
    }
    
    .stats {
      padding: 8px 20px;
      font-size: 12px;
      color: #6b6b8b;
      background: #0a0a1a;
      display: flex;
      justify-content: space-between;
    }
    .mcp-list {
      padding: 8px 20px;
      max-height: 340px;
      overflow-y: auto;
    }
    .mcp-card {
      background: #12122a;
      border: 1px solid #1e1e3a;
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 8px;
      transition: border-color 0.2s;
    }
    .mcp-card:hover { border-color: #6c3ce0; }
    .mcp-card .mcp-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }
    .mcp-card .mcp-name {
      font-size: 14px;
      font-weight: 600;
      color: #e0e0f0;
    }
    .mcp-card .mcp-author {
      font-size: 11px;
      color: #6b6b8b;
      margin-top: 2px;
    }
    .mcp-card .mcp-desc {
      font-size: 12px;
      color: #8b8bcc;
      margin-top: 6px;
      line-height: 1.4;
    }
    .mcp-card .mcp-meta {
      display: flex;
      gap: 12px;
      margin-top: 8px;
      font-size: 11px;
      color: #5b5b7b;
    }
    .mcp-card .install-btn {
      background: linear-gradient(135deg, #6c3ce0, #3b82f6);
      color: white;
      border: none;
      padding: 6px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      white-space: nowrap;
    }
    .mcp-card .install-btn:hover { opacity: 0.9; }
    .mcp-card .install-btn.installed {
      background: #1a3a2a;
      cursor: default;
    }
    .mcp-card .install-btn.locked {
      background: #3a1a1a;
      cursor: pointer;
    }
    .mcp-card .copy-btn {
      background: transparent;
      color: #8b8bcc;
      border: 1px solid #2a2a4a;
      padding: 6px 10px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 11px;
      font-weight: 600;
      margin-left: 6px;
    }
    .mcp-card .copy-btn:hover { background: #1e1e3a; }
    
    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #2a2;
      color: white;
      padding: 8px 20px;
      border-radius: 8px;
      font-size: 13px;
      z-index: 1000;
      animation: fadeInOut 2.5s ease;
      pointer-events: none;
    }
    @keyframes fadeInOut {
      0% { opacity: 0; transform: translateX(-50%) translateY(10px); }
      15% { opacity: 1; transform: translateX(-50%) translateY(0); }
      85% { opacity: 1; }
      100% { opacity: 0; }
    }
    
    .upgrade-banner {
      margin: 8px 20px;
      padding: 12px;
      background: linear-gradient(135deg, #3a1a6e, #1a3a6e);
      border-radius: 10px;
      text-align: center;
    }
    .upgrade-banner p { font-size: 13px; margin-bottom: 8px; }
    .upgrade-banner a {
      color: #c084fc;
      font-size: 12px;
      font-weight: 600;
    }
    
    .loading { text-align: center; padding: 40px; color: #6b6b8b; }
    .empty { text-align: center; padding: 30px; color: #5b5b7b; font-size: 13px; }
  </style>
</head>
<body>
  <div class="header">
    <span class="logo">🌉</span>
    <h1>MCP Bridge</h1>
  </div>
  
  <div class="auth-bar" id="authBar">
    <span class="user" id="userDisplay">Not signed in</span>
    <span id="tierBadge"></span>
    <button id="authBtn" onclick="handleAuth()">Sign In</button>
  </div>
  
  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="Search MCP servers..." oninput="renderMCPs()">
  </div>
  
  <div class="filters" id="filterBar">
    <span class="filter-chip active" data-cat="all" onclick="setFilter('all', this)">All</span>
  </div>
  
  <div class="stats" id="statsBar">
    <span id="mcpCount">0 MCPs available</span>
    <span id="installedCount">0 installed</span>
  </div>
  
  <div id="upgradeBanner" style="display:none;" class="upgrade-banner">
    <p>🔒 You've used all 3 free installs</p>
    <a href="https://buy.stripe.com/PLACEHOLDER" target="_blank">Upgrade to Pro ($9/mo) →</a>
  </div>
  
  <div class="mcp-list" id="mcpList">
    <div class="loading">Loading MCP catalog...</div>
  </div>
  
  <div id="toast" class="toast" style="display:none;"></div>
  
  <script src="popup.js"></script>
</body>
</html>
